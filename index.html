<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SISTEMA SIR - LIQUIDADOR INTEGRAL 2026</title>
    <style>
        :root { --snr-blue: #2c3e50; --snr-green: #27ae60; --snr-light: #f4f7f6; --snr-accent: #2980b9; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; height: 100vh; background: var(--snr-light); }
        #sidebar { width: 280px; background: var(--snr-blue); color: white; padding: 30px; flex-shrink: 0; border-right: 5px solid var(--snr-green); }
        .user-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 8px; font-size: 0.85rem; margin-top: 20px; }
        #main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 30px rgba(0,0,0,0.05); margin-bottom: 30px; }
        .grid-input { display: grid; grid-template-columns: 120px 1fr 200px 100px 160px; gap: 20px; align-items: flex-end; }
        .group { display: flex; flex-direction: column; }
        label { font-size: 0.7rem; font-weight: bold; color: #7f8c8d; text-transform: uppercase; margin-bottom: 8px; }
        input { padding: 14px; border: 2px solid #dfe6e9; border-radius: 8px; font-size: 15px; }
        input:focus { border-color: var(--snr-green); outline: none; }
        .cert-section { margin-top: 25px; padding: 20px; background: #eef2f7; border-radius: 10px; display: flex; align-items: center; gap: 25px; }
        .btn { padding: 14px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-add { background: var(--snr-green); color: white; }
        .btn-cert { background: var(--snr-accent); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; background: #f8f9fa; padding: 15px; font-size: 0.75rem; color: #636e72; }
        td { padding: 15px; border-bottom: 1px solid #f1f2f6; font-size: 14px; }
        .total-display { background: var(--snr-blue); color: var(--snr-green); padding: 25px; border-radius: 15px; text-align: right; margin-top: 20px; }
        .total-display span { font-size: 2.5rem; font-weight: bold; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h1 style="color:white; margin:0;">SNR <span style="color:var(--snr-green);">SIR</span></h1>
    <div class="user-card">
        <b>Funcionario:</b> Yair B. Leal Guerra<br />
        <b>ORIP:</b> Barranquilla<br />
        <b>Vigencia:</b> 2026 (Res. 1726)
    </div>
</aside>

<main id="main">
    <div class="card">
        <h2>Panel de Liquidación Múltiple</h2>
        <div class="grid-input">
            <div class="group">
                <label>Código SIR</label>
                <input type="number" id="cod" placeholder="000" autofocus />
            </div>
            <div class="group">
                <label>Acto Registral</label>
                <input type="text" id="nombre" disabled />
            </div>
            <div class="group" id="boxCuantia" style="visibility: hidden;">
                <label>Base Gravable</label>
                <input type="number" id="base" value="0" />
            </div>
            <div class="group" id="boxFolios" style="display: none;">
                <label>Folios</label>
                <input type="number" id="folios" value="1" min="1" />
            </div>
            <button class="btn btn-add" onclick="agregarActo()">Liquidar</button>
        </div>

        <div class="cert-section">
            <div style="flex-grow: 1;"><b>Certificados de Tradición</b></div>
            <input type="number" id="cantCert" value="0" min="0" style="width: 80px;" />
            <button class="btn btn-cert" onclick="agregarCert()">Añadir Cert.</button>
        </div>
    </div>

    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Cod.</th>
                    <th>Descripción</th>
                    <th>Cuantía/Folios</th>
                    <th>Total Item (Inc. 2%)</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
        <div class="total-display">
            <small style="color:white; display:block;">TOTAL A RECAUDAR</small>
            <span id="vTotal">$ 0</span>
        </div>
    </div>
</main>

<script>
    const DICCIONARIO_SIR = {
        "1": { acto: "VENTA", tarifa: "CON CUANTIA", folios: "NO" },
        "2": { acto: "HIPOTECA", tarifa: "CON CUANTIA", folios: "NO" },
        "3": { acto: "REMATE", tarifa: "CON CUANTIA", folios: "NO" },
        "4": { acto: "SUCESION", tarifa: "CON CUANTIA", folios: "NO" },
        "6": { acto: "PERMUTA", tarifa: "CON CUANTIA", folios: "NO" },
        "7": { acto: "DIVISION MATERIAL", tarifa: "SIN CUANTIA", folios: "SI" },
        "8": { acto: "CANCELACION HIPOTECA", tarifa: "SIN CUANTIA", folios: "SI" },
        "9": { acto: "PATRIMONIO DE FAMILIA", tarifa: "SIN CUANTIA", folios: "SI" },
        "10": { acto: "EMBARGO", tarifa: "SIN CUANTIA", folios: "SI" },
        "11": { acto: "DEMANDA", tarifa: "SIN CUANTIA", folios: "SI" },
        "12": { acto: "REPRODUCCION CONSTANCIA", tarifa: "FIJA", folios: "NO", v: 17500 },
        "13": { acto: "CANCELACION PATRIMONIO DE FAMILIA", tarifa: "SIN CUANTIA", folios: "SI" },
        "14": { acto: "PROPIEDAD HORIZONTAL", tarifa: "SIN CUANTIA", folios: "SI" },
        "15": { acto: "HIPOTECA SIN LIMITE", tarifa: "CON CUANTIA", folios: "NO" },
        "16": { acto: "ACLARACION", tarifa: "SIN CUANTIA", folios: "SI" },
        "17": { acto: "CANCELACION EMBARGO", tarifa: "SIN CUANTIA", folios: "NO" },
        "18": { acto: "AFECTACION A VIVIENDA FAMILIAR", tarifa: "SIN CUANTIA", folios: "SI" },
        "19": { acto: "MATRICULAS", tarifa: "FIJA", folios: "NO", v: 29500 },
        "21": { acto: "ENGLOBE", tarifa: "SIN CUANTIA", folios: "SI" },
        "27": { acto: "DESENGLOBE", tarifa: "SIN CUANTIA", folios: "SI" },
        "28": { acto: "FIDUCIA", tarifa: "CON CUANTIA", folios: "NO" },
        "31": { acto: "SERVIDUMBRE (CON CUANTIA)", tarifa: "CON CUANTIA", folios: "NO" },
        "35": { acto: "DECLARACION CONSTRUCCION (CON)", tarifa: "CON CUANTIA", folios: "NO" },
        "36": { acto: "DACION EN PAGO", tarifa: "CON CUANTIA", folios: "NO" },
        "38": { acto: "VIVIENDA DE INTERES SOCIAL (VIS)", tarifa: "ESPECIAL", folios: "NO" },
        "40": { acto: "USUFRUCTO (CON CUANTIA)", tarifa: "CON CUANTIA", folios: "NO" },
        "43": { acto: "DECLARACION CONSTRUCCION (SIN)", tarifa: "SIN CUANTIA", folios: "SI" },
        "48": { acto: "ESCISION (CON CUANTIA)", tarifa: "CON CUANTIA", folios: "NO" },
        "50": { acto: "FUSION (SIN CUANTIA)", tarifa: "SIN CUANTIA", folios: "SI" },
        "110": { acto: "CONSTITUCION RESGUARDO INDIGENA", tarifa: "EXENTO", folios: "NO" },
        "120": { acto: "LIQUIDACION SOCIEDAD CONYUGAL (CON)", tarifa: "CON CUANTIA", folios: "NO" },
        "128": { acto: "CESION TITULO GRATUITO BIENES FISCALES", tarifa: "EXENTO", folios: "NO" },
        "156": { acto: "EXPROPIACION", tarifa: "CON CUANTIA", folios: "NO" },
        "200": { acto: "ACTUALIZACION DE NOMENCLATURA", tarifa: "SIN CUANTIA", folios: "SI" },
        "903": { acto: "ACTUALIZACION DE AREA Y/O LINDEROS", tarifa: "SIN CUANTIA", folios: "SI" },
        "1013": { acto: "TRANSFERENCIA DE DOMINIO TITULO CESION", tarifa: "CON CUANTIA", folios: "NO" }
    };

    let items = [];
    const VAL_CERT = 24300;

    document.getElementById('cod').addEventListener('input', function() {
        const info = DICCIONARIO_SIR[this.value];
        const n = document.getElementById('nombre'), bc = document.getElementById('boxCuantia'), bf = document.getElementById('boxFolios');
        if(info) {
            n.value = info.acto;
            bc.style.visibility = (info.tarifa === "CON CUANTIA" || info.tarifa === "ESPECIAL") ? "visible" : "hidden";
            bf.style.display = info.folios === "SI" ? "flex" : "none";
        } else { n.value = ""; }
    });

    function agregarActo() {
        const codVal = document.getElementById('cod').value;
        const info = DICCIONARIO_SIR[codVal];
        if(!info) return;
        const base = parseFloat(document.getElementById('base').value) || 0;
        const fols = parseInt(document.getElementById('folios').value) || 1;
        let der = 0, vF = 0;

        if(info.tarifa === "CON CUANTIA") {
            if (base <= 12852101) der = 53100;
            else if (base <= 192778606) der = base * 0.00911;
            else if (base <= 334149656) der = base * 0.01131;
            else der = base * 0.01333;
        } else if(info.tarifa === "ESPECIAL") {
            der = Math.max(26550, (base * 0.00911) * 0.5);
        } else if(info.tarifa === "FIJA") {
            der = info.v;
        } else if(info.tarifa === "EXENTO") {
            der = 0;
        } else {
            der = 29500;
            if(info.folios === "SI" && fols > 1) vF = (fols - 1) * 15300;
        }

        let total = (info.tarifa === "EXENTO") ? 0 : Math.ceil(((der + vF) * 1.02) / 100) * 100;
        items.push({ cod: codVal, n: info.acto, det: info.tarifa === "CON CUANTIA" ? '$'+base.toLocaleString() : fols+' Folios', t: total });
        limpiar(); render();
    }

    function agregarCert() {
        const c = parseInt(document.getElementById('cantCert').value);
        if(c > 0) { items.push({ cod: "CERT", n: "CERTIFICADO TRADICION", det: c + " Unid.", t: c * VAL_CERT }); }
        document.getElementById('cantCert').value = "0"; render();
    }

    function render() {
        const l = document.getElementById('lista');
        let suma = 0; l.innerHTML = "";
        items.forEach((it, i) => {
            suma += it.t;
            l.innerHTML += `<tr><td>${it.cod}</td><td>${it.n}</td><td>${it.det}</td><td>$ ${it.t.toLocaleString()}</td><td><button onclick="items.splice(${i},1);render()">✕</button></td></tr>`;
        });
        document.getElementById('vTotal').innerText = "$ " + suma.toLocaleString();
    }

    function limpiar() {
        document.getElementById('cod').value = ""; document.getElementById('base').value = "0";
        document.getElementById('folios').value = "1"; document.getElementById('cod').focus();
    }
</script>
</body>
</html>
