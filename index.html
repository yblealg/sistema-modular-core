<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SNR SIR - Liquidador Oficial 2026</title>

    <style>
        :root {
            --snr-blue: #2c3e50;
            --snr-green: #8ada09;
            --bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background: var(--bg);
        }

        #sidebar {
            width: 280px;
            background: var(--snr-blue);
            color: white;
            padding: 25px;
            flex-shrink: 0;
            border-right: 5px solid var(--snr-green);
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        #main {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .grid-input {
            display: grid;
            grid-template-columns: 100px 1fr 180px 100px 150px;
            gap: 15px;
            align-items: flex-end;
        }

        label {
            font-size: 0.7rem;
            font-weight: bold;
            color: #7f8c8d;
            text-transform: uppercase;
        }

        input {
            padding: 12px;
            border: 2px solid #dfe6e9;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-add {
            background: var(--snr-green);
            color: white;
        }

        .btn-cert {
            background: #2980b9;
            color: white;
            margin-top: 15px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th {
            text-align: left;
            background: #f8f9fa;
            padding: 12px;
            font-size: 0.75rem;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }

        .total-box {
            background: var(--snr-blue);
            color: var(--snr-green);
            padding: 20px;
            border-radius: 10px;
            text-align: right;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- ================= SIDEBAR ================= -->
<aside id="sidebar">
    <h2>SNR SIR</h2>
    <p>ORIP Barranquilla</p>
    <hr>

    <p><small><b>Funcionario:</b><br>Yair B. Leal Guerra</small></p>
    <p><small><b>Auxiliar:</b><br>Administrativo 4044_13</small></p>
    <p><small><b>Norma:</b> Tarifa 2026<br>Res. 1726 del 29 de Enero de 2026</small></p>

    <div style="margin-top: 15px; text-align: center;">
        <img src="OTI.jpg" style="max-width:100%; border-radius:4px;">
    </div>

    <div style="margin-top: 10px; text-align: center;">
    <p style="color: #8ada09; margin: 0; line-height: 1.2;">
        <small><b>Liquidation project:</b><br>
        <span style="color: white;">Versión 3.0</span></small>
    </p>
</div>
</aside>

<!-- ================= MAIN ================= -->
<main id="main">

    <!-- FORMULARIO -->
    <div class="card">
        <h3>Liquidador de Actos</h3>

        <div class="grid-input">

            <div>
                <label>Código SIR</label>
                <input type="number" id="cod" autofocus>
            </div>

            <div>
                <label>Nombre del Acto</label>
                <input type="text" id="nombreActo" disabled>
            </div>

            <div id="boxCuantia" style="visibility:hidden;">
                <label>Base Gravable</label>
                <input type="number" id="base" value="0">
            </div>

            <div id="boxFolios" style="display:none;">
                <label>Folios</label>
                <input type="number" id="folios" value="1">
            </div>

            <button class="btn btn-add" onclick="agregarActo()">Liquidar</button>

            <button onclick="exportarPDF()" style="background:#2c3e50;color:white;padding:10px;border-radius:4px;">
                EXPORTAR PDF
            </button>
        </div>

        <!-- CERTIFICADOS -->
        <div style="margin-top:20px;border-top:1px solid #eee;padding-top:15px;">
            <label>Certificados de Tradición</label><br>
            <input type="number" id="cantCert" value="0" style="width:80px;">
            <button class="btn btn-cert" onclick="agregarCert()">+ Añadir</button>
        </div>
    </div>

    <!-- TABLA -->
    <div class="card">
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Acto</th>
                    <th>Base / Cant</th>
                    <th>Total</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="tabla"></tbody>
        </table>

        <div class="total-box">
            <small style="color:white">TOTAL GENERAL</small><br>
            <b id="vTotal">$ 0</b>
        </div>
    </div>

</main>

<!-- LIBRERÍAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script>

/* ================= CONFIGURACIÓN ================= */

const DICCIONARIO_SIR = {
    "1": { acto: "VENTA", tarifa: "CON CUANTIA", folios: "NO" },
    "2": { acto: "HIPOTECA", tarifa: "CON CUANTIA", folios: "NO" },
    "3": { acto: "REMATE", tarifa: "CON CUANTIA", folios: "NO" },
    "4": { acto: "SUCESION", tarifa: "CON CUANTIA", folios: "NO" },
    "6": { acto: "PERMUTA", tarifa: "CON CUANTIA", folios: "NO" },
    "7": { acto: "DIVISION MATERIAL", tarifa: "SIN CUANTIA", folios: "SI" },
    "8": { acto: "CANCELACION HIPOTECA", tarifa: "SIN CUANTIA", folios: "SI" },
    "9": { acto: "PATRIMONIO DE FAMILIA", tarifa: "SIN CUANTIA", folios: "SI" },
    "10": { acto: "EMBARGO", tarifa: "SIN CUANTIA", folios: "SI" },
    "11": { acto: "DEMANDA", tarifa: "SIN CUANTIA", folios: "SI" },
    "12": { acto: "REPRODUCCION CONSTANCIA", tarifa: "FIJA", folios: "NO", valor: 17500 },
    "13": { acto: "CANCELACION PATRIMONIO DE FAMILIA", tarifa: "SIN CUANTIA", folios: "SI" },
    "14": { acto: "PROPIEDAD HORIZONTAL", tarifa: "SIN CUANTIA", folios: "SI" },
    "15": { acto: "HIPOTECA SIN LIMITE", tarifa: "CON CUANTIA", folios: "NO" },
    "16": { acto: "ACLARACION", tarifa: "SIN CUANTIA", folios: "SI" },
    "17": { acto: "CANCELACION EMBARGO", tarifa: "SIN CUANTIA", folios: "NO" },
    "18": { acto: "AFECTACION A VIVIENDA FAMILIAR", tarifa: "SIN CUANTIA", folios: "SI" },
    "19": { acto: "MATRICULAS", tarifa: "FIJA", folios: "NO", valor: 29500 },
    "21": { acto: "ENGLOBE", tarifa: "SIN CUANTIA", folios: "SI" },
    "27": { acto: "DESENGLOBE", tarifa: "SIN CUANTIA", folios: "SI" },
    "28": { acto: "FIDUCIA", tarifa: "CON CUANTIA", folios: "NO" },
    "31": { acto: "SERVIDUMBRE (CON CUANTIA)", tarifa: "CON CUANTIA", folios: "NO" },
    "35": { acto: "DECLARACION CONSTRUCCION (CON)", tarifa: "CON CUANTIA", folios: "NO" },
    "36": { acto: "DACION EN PAGO", tarifa: "CON CUANTIA", folios: "NO" },
    "38": { acto: "VIVIENDA DE INTERES SOCIAL (VIS)", tarifa: "ESPECIAL", folios: "NO" },
    "40": { acto: "USUFRUCTO (CON CUANTIA)", tarifa: "CON CUANTIA", folios: "NO" },
    "43": { acto: "DECLARACION CONSTRUCCION (SIN)", tarifa: "SIN CUANTIA", folios: "SI" },
    "48": { acto: "ESCISION (CON CUANTIA)", tarifa: "CON CUANTIA", folios: "NO" },
    "50": { acto: "FUSION (SIN CUANTIA)", tarifa: "SIN CUANTIA", folios: "SI" },
    "110": { acto: "CONSTITUCION RESGUARDO INDIGENA", tarifa: "EXENTO", folios: "NO" },
    "120": { acto: "LIQUIDACION SOCIEDAD CONYUGAL (CON)", tarifa: "CON CUANTIA", folios: "NO" },
    "128": { acto: "CESION TITULO GRATUITO BIENES FISCALES", tarifa: "EXENTO", folios: "NO" },
    "156": { acto: "EXPROPIACION", tarifa: "CON CUANTIA", folios: "NO" },
    "200": { acto: "ACTUALIZACION DE NOMENCLATURA", tarifa: "SIN CUANTIA", folios: "SI" },
    "903": { acto: "ACTUALIZACION DE AREA Y/O LINDEROS", tarifa: "SIN CUANTIA", folios: "SI" },
    "1013": { acto: "TRANSFERENCIA DE DOMINIO TITULO CESION", tarifa: "CON CUANTIA", folios: "NO" }
};

let liquidacion = [];
const VALOR_CERT = 24300;

/* ================= EVENTOS ================= */

document.getElementById('cod').addEventListener('input', function () {

    const info = DICCIONARIO_SIR[this.value];
    const boxC = document.getElementById('boxCuantia');
    const boxF = document.getElementById('boxFolios');

    if (info) {
        document.getElementById('nombreActo').value = info.acto;

        boxC.style.visibility = (info.tarifa === "CON CUANTIA" || info.tarifa === "ESPECIAL") ? "visible" : "hidden";
        boxF.style.display = (info.folios === "SI") ? "block" : "none";
    }
});

/* ================= FUNCIONES ================= */

function agregarActo() {

    const cod = document.getElementById('cod').value;
    const info = DICCIONARIO_SIR[cod];

    if (!info) return;

    const cuantia = parseFloat(document.getElementById('base').value) || 0;
    const folios = parseInt(document.getElementById('folios').value) || 1;

    let derechos = 0;

    // Cálculo según tipo de tarifa
    if (info.tarifa === "CON CUANTIA") {

        if (cuantia <= 12852101) derechos = 53100;
        else if (cuantia <= 192778606) derechos = cuantia * 0.00911;
        else if (cuantia <= 334149656) derechos = cuantia * 0.01131;
        else if (cuantia <= 494798857) derechos = cuantia * 0.01260;
        else derechos = cuantia * 0.01333;

    } else if (info.tarifa === "SIN CUANTIA") {

        derechos = 29500 + (folios > 1 ? (folios - 1) * 15300 : 0);

    } else if (info.tarifa === "FIJA") {

        derechos = info.valor;

    } else if (info.tarifa === "ESPECIAL") {

        derechos = Math.max(26550, (cuantia * 0.00911) * 0.5);

    } else if (info.tarifa === "EXENTO") {

        derechos = 0;
    }

    // 2% + redondeo
    const total = (info.tarifa === "EXENTO") ? 0 : Math.ceil((derechos * 1.02) / 100) * 100;

    liquidacion.push({
        cod,
        acto: info.acto,
        base: (info.tarifa === "CON CUANTIA") ? cuantia : folios,
        total
    });

    render();
}

/* ================= CERTIFICADOS ================= */

function agregarCert() {

    const c = parseInt(document.getElementById('cantCert').value);

    if (c > 0) {
        liquidacion.push({
            cod: "CERT",
            acto: "CERTIFICADO",
            base: c,
            total: c * VALOR_CERT
        });
    }

    render();
}

/* ================= RENDER ================= */

function render() {

    const tabla = document.getElementById('tabla');
    let suma = 0;

    tabla.innerHTML = "";

    liquidacion.forEach((item, i) => {

        suma += item.total;

        tabla.innerHTML += `
            <tr>
                <td>${item.cod}</td>
                <td>${item.acto}</td>
                <td>${item.base.toLocaleString()}</td>
                <td>$${item.total.toLocaleString()}</td>
                <td>
                    <button onclick="liquidacion.splice(${i},1);render()">✕</button>
                </td>
            </tr>
        `;
    });

    document.getElementById('vTotal').innerText = "$ " + suma.toLocaleString();
}



// 🔽 funcion para llamar el logo SNR

function getBase64ImageFromURL(url) {
    return new Promise((resolve, reject) => {
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = url;

        img.onload = () => {
            const canvas = document.createElement("canvas");
            canvas.width = img.width;
            canvas.height = img.height;

            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0);

            resolve(canvas.toDataURL("image/jpeg"));
        };

        img.onerror = error => reject(error);
    });
}
/* ================= PDF ================= */

// 🔽 REEMPLAZA TODA TU FUNCIÓN exportarPDF POR ESTA
async function exportarPDF() {

    if (liquidacion.length === 0) {
        alert("No hay datos");
        return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    // 🔹 CARGAR LOGO
    const logo = await getBase64ImageFromURL("logoSNR.jpg");

    // 🔹 INSERTAR LOGO (posición X, Y, ancho, alto)
    doc.addImage(logo, 'JPEG', 15, 10, 40, 15);

    // 🔹 TÍTULO
    doc.setFontSize(14);
    doc.text("", 105, 18, { align: 'center' });

    doc.setFontSize(10);
    doc.text("ORIP Barranquilla - Liquidación 2026", 105, 24, { align: 'center' });

    // 🔹 TABLA
    const body = liquidacion.map(item => [
        item.cod,
        item.acto,
        item.base.toLocaleString(),
        `$ ${item.total.toLocaleString()}`
    ]);

    doc.autoTable({
        startY: 35,
        head: [['Código', 'Acto', 'Base', 'Total']],
        body: body
    });

    // 🔹 TOTAL
    const total = liquidacion.reduce((acc, item) => acc + item.total, 0);
    doc.text(`TOTAL: $ ${total.toLocaleString()}`, 190, doc.lastAutoTable.finalY + 10, { align: 'right' });

    doc.save(`SNR_${Date.now()}.pdf`);
}

</script>

</body>
</html>
