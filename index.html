<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNR Liquidador JSON - ORIP Quilla</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; margin: 0; height: 100vh; background: #f4f7f6; }
        #sidebar { width: 260px; background: #2c3e50; color: white; padding: 20px; }
        #main { flex-grow: 1; padding: 40px; overflow-y: auto; }
        
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        .row { display: flex; gap: 20px; align-items: flex-end; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; flex: 1; }
        
        label { font-weight: 600; margin-bottom: 8px; color: #444; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 15px; }
        input:disabled { background: #f1f2f6; color: #a4b0be; }

        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th { background: #34495e; color: white; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #eee; background: white; }
        
        .btn-add { background: #1abc9c; color: white; border: none; padding: 13px 30px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-add:hover { background: #16a085; }
        .total-box { margin-top: 20px; text-align: right; font-size: 22px; font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

<aside id="sidebar">
    <h2>SNR Registro</h2>
    <p>Módulo ORIP Barranquilla</p>
    <hr style="opacity: 0.2">
    <div style="margin-top: 20px;">
        <small>Usuario: Auxiliar Administrativo</small>
    </div>
</aside>

<main id="main">
    <div class="card">
        <h2>Liquidador Basado en JSON</h2>
        <div class="row">
            <div class="form-group" style="max-width: 150px;">
                <label>Código Acto</label>
                <input type="number" id="codigo" placeholder="Ej: 125">
            </div>
            <div class="form-group">
                <label>Nombre del Acto</label>
                <input type="text" id="nombreActo" disabled placeholder="Busque un código...">
            </div>
            <div class="form-group">
                <label>Cuantía ($)</label>
                <input type="number" id="cuantia" disabled placeholder="0">
            </div>
            <button class="btn-add" id="btnAgregar">Agregar</button>
        </div>
    </div>

    <table id="tablaActos">
        <thead>
            <tr>
                <th>Código / Acto</th>
                <th>Base Liquidación</th>
                <th>Derechos Registro</th>
                <th>Acción</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <div class="total-box" id="displayTotal">Total: $0</div>
</main>

<script>
    // 3. Lógica de Negocio con JSON
    const actosDB = {
        "101": { "nombre": "Aporte a Sociedad", "tipo": "proporcional", "tarifa": 0.005 },
        "125": { "nombre": "Compraventa", "tipo": "proporcional", "tarifa": 0.005 },
        "126": { "nombre": "Hipoteca", "tipo": "proporcional", "tarifa": 0.005 },
        "168": { "nombre": "Cancelación de Hipoteca", "tipo": "fijo", "valor": 23600 },
        "411": { "nombre": "Afectación a Vivienda Familiar", "tipo": "exento", "valor": 0 }
    };

    let totalLiquidacion = 0;
    const inputCodigo = document.getElementById('codigo');
    const inputNombre = document.getElementById('nombreActo');
    const inputCuantia = document.getElementById('cuantia');
    const btnAgregar = document.getElementById('btnAgregar');
    const tabla = document.querySelector('#tablaActos tbody');

    // Buscar Acto al escribir código
    inputCodigo.addEventListener('input', () => {
        const data = actosDB[inputCodigo.value];
        if (data) {
            inputNombre.value = data.nombre;
            inputCuantia.disabled = (data.tipo !== "proporcional");
            if(data.tipo !== "proporcional") inputCuantia.value = "";
        } else {
            inputNombre.value = "";
            inputCuantia.disabled = true;
        }
    });

    // Agregar a la lista
    btnAgregar.addEventListener('click', () => {
        const cod = inputCodigo.value;
        const data = actosDB[cod];
        
        if (!data) return alert("Código no válido");

        let valorCalculado = 0;
        const base = parseFloat(inputCuantia.value) || 0;

        if (data.tipo === "proporcional") {
            if (base <= 0) return alert("Ingrese cuantía válida");
            valorCalculado = Math.round(base * data.tarifa);
        } else {
            valorCalculado = data.valor;
        }

        // Insertar fila
        const row = tabla.insertRow();
        row.innerHTML = `
            <td><strong>${cod}</strong> - ${data.nombre}</td>
            <td>$ ${base.toLocaleString()}</td>
            <td>$ ${valorCalculado.toLocaleString()}</td>
            <td><button onclick="eliminar(this, ${valorCalculado})" style="color:red; cursor:pointer; border:none; background:none;">Eliminar</button></td>
        `;

        totalLiquidacion += valorCalculado;
        document.getElementById('displayTotal').innerText = `Total: $${totalLiquidacion.toLocaleString()}`;
        
        // Reset
        inputCodigo.value = "";
        inputNombre.value = "";
        inputCuantia.value = "";
        inputCuantia.disabled = true;
    });

    function eliminar(btn, valor) {
        btn.closest('tr').remove();
        totalLiquidacion -= valor;
        document.getElementById('displayTotal').innerText = `Total: $${totalLiquidacion.toLocaleString()}`;
    }
</script>

</body>
</html>
